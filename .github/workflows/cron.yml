name: 3시간마다 뉴스 수집

on:
  schedule:
    # 3시간마다 실행 (0분, 3시, 6시, 9시...)
    # UTC 기준이라 한국 시간보다 9시간 느리지만, 간격은 동일하게 3시간입니다.
    - cron: '0 */3 * * *'
  workflow_dispatch: # 우리가 버튼을 눌러서 직접 실행해볼 수 있게 해줍니다.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 3.12 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 필요한 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 뉴스 수집 코드 실행
        run: python crawl_news.py
